# V1 local stack (architecture-guide §8). Services are added here as the build order
# in §11 progresses.
#   Step 1: Identity Service + its own Postgres.
#   Step 2: API Gateway (YARP) — now the single entry point the frontend talks to (§3, §10).
#   Step 3: Program Service + its own Postgres.
#   Step 4: Tracking Service + its own Postgres (calls Program Service for access checks).
#
# Only the Gateway publishes a host port. Individual services are reachable only on the
# internal compose network (§10: service ports are never exposed to the frontend).

services:
  identity-db:
    image: postgres:16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: identity
    volumes:
      - identity-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d identity"]
      interval: 5s
      timeout: 3s
      retries: 10

  identity-service:
    build:
      context: ./services/identity-service
      dockerfile: Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ConnectionStrings__IdentityDb: "Host=identity-db;Database=identity;Username=postgres;Password=postgres"
      Jwt__Issuer: "fitcoach-identity"
      Jwt__Audience: "fitcoach"
      # Dev-only key, shared with the gateway. In a real deployment this comes from a
      # secret, never the compose file.
      Jwt__SigningKey: "dev-only-change-me-please-use-a-long-random-32plus-char-key"
      Jwt__ExpiryMinutes: "60"
    expose:
      - "8080" # internal only — reachable by the gateway, not the host
    depends_on:
      identity-db:
        condition: service_healthy

  program-db:
    image: postgres:16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: program
    volumes:
      - program-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d program"]
      interval: 5s
      timeout: 3s
      retries: 10

  program-service:
    build:
      context: ./services/program-service
      dockerfile: Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ConnectionStrings__ProgramDb: "Host=program-db;Database=program;Username=postgres;Password=postgres"
    expose:
      - "8080" # internal only — reachable by the gateway, not the host
    depends_on:
      program-db:
        condition: service_healthy

  tracking-db:
    image: postgres:16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: tracking
    volumes:
      - tracking-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d tracking"]
      interval: 5s
      timeout: 3s
      retries: 10

  tracking-service:
    build:
      context: ./services/tracking-service
      dockerfile: Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ConnectionStrings__TrackingDb: "Host=tracking-db;Database=tracking;Username=postgres;Password=postgres"
      # Synchronous cross-service access checks (architecture-guide §4).
      Services__ProgramBaseUrl: "http://program-service:8080"
    expose:
      - "8080" # internal only — reachable by the gateway, not the host
    depends_on:
      tracking-db:
        condition: service_healthy
      program-service:
        condition: service_started

  gateway:
    build:
      context: ./services/gateway
      dockerfile: Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      Jwt__Issuer: "fitcoach-identity"
      Jwt__Audience: "fitcoach"
      # Must match the Identity Service signing key so the gateway can validate tokens.
      Jwt__SigningKey: "dev-only-change-me-please-use-a-long-random-32plus-char-key"
    ports:
      - "8080:8080" # the only host-exposed port; the frontend points here
    depends_on:
      - identity-service
      - program-service
      - tracking-service

volumes:
  identity-db-data:
  program-db-data:
  tracking-db-data:
